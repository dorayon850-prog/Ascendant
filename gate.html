<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>ASCENDANT — Access Required</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="theme-color" content="#02020a" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap" rel="stylesheet">

        <style>
            /* ── RESET ── */
            *{margin:0;padding:0;box-sizing:border-box;}

            /* ── BASE ── */
            .staticrypt-html,.staticrypt-body{height:100%;}

            body{
                background:#02020a;
                color:#c8d8ff;
                font-family:'Share Tech Mono',monospace;
                min-height:100vh;
                display:flex;
                align-items:center;
                justify-content:center;
                overflow:hidden;
                position:relative;
            }

            /* ── GRID BACKGROUND ── */
            body::before{
                content:'';
                position:fixed;
                inset:0;
                background-image:
                    linear-gradient(rgba(68,136,255,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(68,136,255,0.04) 1px, transparent 1px);
                background-size:80px 80px;
                pointer-events:none;
                z-index:0;
            }

            /* ── CENTRE GLOW ── */
            body::after{
                content:'';
                position:fixed;
                top:50%;left:50%;
                transform:translate(-50%,-50%);
                width:600px;height:600px;
                background:radial-gradient(circle, rgba(68,136,255,0.08) 0%, transparent 70%);
                pointer-events:none;
                z-index:0;
            }

            /* ── PARTICLES ── */
            #ascendant-particles{
                position:fixed;
                inset:0;
                pointer-events:none;
                z-index:0;
                opacity:0.4;
            }

            /* ── SPINNER ── */
            .staticrypt-spinner-container{
                height:100%;
                display:flex;
                align-items:center;
                justify-content:center;
                position:fixed;
                inset:0;
                background:#02020a;
                z-index:10;
            }

            .staticrypt-spinner{
                display:inline-block;
                width:2rem;height:2rem;
                border:2px solid #1e1e6a;
                border-top-color:#4488ff;
                border-radius:50%;
                animation:spin 0.75s linear infinite;
            }

            @keyframes spin{to{transform:rotate(360deg);}}

            /* ── GATE BOX ── */
            .staticrypt-content{
                position:relative;
                z-index:1;
                width:100%;
                display:flex;
                align-items:center;
                justify-content:center;
                min-height:100vh;
                padding:20px;
            }

            .staticrypt-page{
                width:100%;
                max-width:420px;
            }

            .staticrypt-form{
                position:relative;
                background:linear-gradient(135deg,#10103a 0%,#0a0a30 100%);
                border:1px solid #1e1e6a;
                border-radius:4px;
                padding:48px 36px;
                text-align:center;
                animation:fadeIn 0.8s ease forwards;
            }

            /* Top accent line */
            .staticrypt-form::before{
                content:'';
                position:absolute;
                top:0;left:0;right:0;
                height:2px;
                background:linear-gradient(90deg,#8844ff,#4488ff,#00d4ff);
                border-radius:4px 4px 0 0;
            }

            /* Corner marks */
            .staticrypt-form::after{
                content:'';
                position:absolute;
                inset:0;
                pointer-events:none;
                border-radius:4px;
            }

            .corner{position:absolute;width:14px;height:14px;border-color:#00d4ff;border-style:solid;}
            .corner-tl{top:8px;left:8px;border-width:1px 0 0 1px;}
            .corner-tr{top:8px;right:8px;border-width:1px 1px 0 0;}
            .corner-bl{bottom:8px;left:8px;border-width:0 0 1px 1px;}
            .corner-br{bottom:8px;right:8px;border-width:0 1px 1px 0;}

            /* ── HEADER ── */
            .gate-sys-label{
                font-size:9px;
                letter-spacing:5px;
                color:#00d4ff;
                text-transform:uppercase;
                margin-bottom:12px;
                animation:flicker 4s infinite;
                display:block;
            }

            .gate-title{
                font-family:'Black Han Sans',sans-serif;
                font-size:clamp(28px,9vw,48px);
                letter-spacing:4px;
                background:linear-gradient(135deg,#fff 0%,#00d4ff 40%,#8844ff 100%);
                -webkit-background-clip:text;
                -webkit-text-fill-color:transparent;
                background-clip:text;
                margin-bottom:6px;
                filter:drop-shadow(0 0 20px rgba(68,136,255,0.4));
                display:block;
                overflow:hidden;
            }

            .gate-subtitle{
                font-size:9px;
                letter-spacing:3px;
                color:#5566aa;
                margin-bottom:32px;
                display:block;
            }

            .gate-lock{
                font-size:32px;
                margin-bottom:20px;
                display:block;
                filter:drop-shadow(0 0 12px rgba(68,136,255,0.5));
            }

            /* ── INSTRUCTIONS ── */
            .staticrypt-instructions{display:none;}

            /* ── HR ── */
            .staticrypt-hr{display:none;}

            /* ── PASSWORD FIELD ── */
            .gate-input-label{
                font-size:9px;
                letter-spacing:3px;
                color:#5566aa;
                text-transform:uppercase;
                margin-bottom:8px;
                text-align:left;
                display:block;
            }

            .staticrypt-password-container{
                position:relative;
                width:100%;
                margin-bottom:16px;
            }

            .staticrypt-password-container input[type="password"],
            .staticrypt-password-container input[type="text"]{
                width:100%;
                background:rgba(255,255,255,0.03);
                border:1px solid #1e1e6a;
                border-radius:3px;
                color:#c8d8ff;
                font-family:'Share Tech Mono',monospace;
                font-size:16px;
                letter-spacing:4px;
                padding:14px 44px 14px 16px;
                outline:none;
                transition:border-color 0.3s, box-shadow 0.3s;
                text-align:center;
                box-sizing:border-box;
            }

            .staticrypt-password-container input:focus{
                border-color:#4488ff;
                box-shadow:0 0 20px rgba(68,136,255,0.2);
            }

            .staticrypt-password-container input::placeholder{
                color:#2a2a5a;
                letter-spacing:2px;
                font-size:12px;
            }

            .staticrypt-toggle-password-visibility{
                cursor:pointer;
                height:18px;
                opacity:0.4;
                padding:0;
                position:absolute;
                right:14px;
                top:50%;
                transform:translateY(-50%);
                width:18px;
                filter:invert(1);
            }

            /* ── SUBMIT BUTTON ── */
            .staticrypt-decrypt-button{
                width:100%;
                background:linear-gradient(135deg,rgba(68,136,255,0.2),rgba(136,68,255,0.2));
                border:1px solid #4488ff;
                border-radius:3px;
                color:#00d4ff;
                font-family:'Share Tech Mono',monospace;
                font-size:12px;
                letter-spacing:4px;
                padding:14px;
                cursor:pointer;
                transition:all 0.3s;
                text-transform:uppercase;
                margin-bottom:20px;
                outline:none;
            }

            .staticrypt-decrypt-button:hover{
                background:rgba(68,136,255,0.3);
                box-shadow:0 0 20px rgba(68,136,255,0.4);
            }

            .staticrypt-decrypt-button:active{
                transform:scale(0.98);
            }

            /* ── REMEMBER ME ── */
            label.staticrypt-remember{
                display:flex;
                align-items:center;
                justify-content:center;
                gap:8px;
                margin-bottom:24px;
                font-size:9px;
                letter-spacing:2px;
                color:#5566aa;
                cursor:pointer;
            }

            .staticrypt-remember input[type="checkbox"]{
                accent-color:#4488ff;
                width:14px;height:14px;
                transform:scale(1);
                margin-right:0;
                cursor:pointer;
            }

            /* ── FOOTER ── */
            .gate-footer{
                font-size:8px;
                letter-spacing:2px;
                color:#2a2a5a;
                line-height:1.8;
                border-top:1px solid #1e1e6a;
                padding-top:20px;
                margin-top:4px;
            }

            /* ── HIDDEN ── */
            .hidden{display:none !important;}

            /* ── ANIMATIONS ── */
            @keyframes flicker{
                0%,94%,96%,100%{opacity:1}
                95%{opacity:0.3}
            }
            @keyframes fadeIn{
                from{opacity:0;transform:translateY(12px);}
                to{opacity:1;transform:translateY(0);}
            }

            /* ── MOBILE ── */
            @media(max-width:480px){
                .staticrypt-form{padding:36px 24px;}
                .gate-title{font-size:clamp(28px,10vw,44px);}
            }
        </style>
    </head>

        <!-- Particles -->
        <script>
        const _canvas=document.getElementById('ascendant-particles'),_ctx=_canvas.getContext('2d');
        let _pts=[];
        function _rsz(){_canvas.width=innerWidth;_canvas.height=innerHeight;}
        _rsz();addEventListener('resize',_rsz);
        for(let i=0;i<50;i++) _pts.push({
            x:Math.random()*innerWidth,y:Math.random()*innerHeight,
            vx:(Math.random()-.5)*.3,vy:-Math.random()*.3-.05,
            sz:Math.random()*1.5+.5,a:Math.random()*.4+.1
        });
        (function _ap(){
            _ctx.clearRect(0,0,_canvas.width,_canvas.height);
            _pts.forEach(p=>{
                p.x+=p.vx;p.y+=p.vy;
                if(p.y<0){p.y=_canvas.height;p.x=Math.random()*_canvas.width;}
                if(p.x<0||p.x>_canvas.width)p.vx*=-1;
                _ctx.beginPath();_ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
                _ctx.fillStyle=`rgba(68,136,255,${p.a})`;_ctx.fill();
            });
            requestAnimationFrame(_ap);
        })();
        </script>
